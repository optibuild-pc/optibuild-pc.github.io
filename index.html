<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti-build PC | Valenciennes</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0b0e14; --card-bg: #161b22; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); line-height: 1.6; }
        
        nav { background: rgba(26, 42, 68, 0.95); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9em; text-transform: uppercase; }
        nav a:hover { color: var(--primary); }

        header { padding: 60px 20px; text-align: center; background: radial-gradient(circle at center, #1a2a44 0%, #0b0e14 100%); border-bottom: 2px solid var(--primary); }
        h1 { margin: 0; font-size: 2.5em; letter-spacing: 2px; }

        .container { max-width: 1000px; margin: auto; padding: 30px 20px; }
        
        .pc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .pc-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; }
        .pc-card img { width: 100%; height: 350px; object-fit: cover; }
        .pc-info { padding: 20px; text-align: center; }

        /* WIDGET WHATSAPP */
        .wa-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        #wa-box { display: none; width: 280px; background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .wa-header { background: #1a2a44; color: white; padding: 15px; display: flex; align-items: center; }
        .wa-content { padding: 20px; color: #333; background: #f0f2f5; font-size: 14px; }
        .wa-link { display: block; margin: 10px; background: #25d366; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .wa-button { width: 65px; height: 65px; background: var(--bg); border-radius: 50%; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="boutique.html">Boutique</a>
        <a href="avis.html">Avis</a>
        <a href="contact.html">Contact</a>
    </nav>

    <header>
        <h1>OPTI-BUILD PC</h1>
        <p style="color: var(--primary); font-weight: bold;">L'EXPERTISE GAMING À VALENCIENNES</p>
    </header>

    <div class="container">
        <h2 style="border-left: 5px solid var(--primary); padding-left: 15px;">Derniers Montages Clients</h2>
        
        <div class="pc-grid">
            <div class="pc-card">
                <img src="https://optibuild-pc.github.io/pc-blanc.jpg" alt="PC Gamer Blanc">
                <div class="pc-info">
                    <h3 style="margin:0; color:var(--primary);">Config White Edition</h3>
                    <p style="font-size:0.9em; color:#8b949e;">Montage soigné & performant</p>
                </div>
            </div>

            <div class="pc-card">
                <img src="https://optibuild-pc.github.io/pc-noir.jpg" alt="PC Gamer Noir">
                <div class="pc-info">
                    <h3 style="margin:0; color:var(--primary);">Full Black Stealth</h3>
                    <p style="font-size:0.9em; color:#8b949e;">Puissance brute & Silence</p>
                </div>
            </div>
        </div>
    </div>

    <div class="wa-widget">
        <div id="wa-box">
            <div class="wa-header">
                <div style="width:35px; height:35px; background:#0b0e14; border-radius:50%; margin-right:10px; display:flex; align-items:center; justify-content:center; border:1px solid var(--primary);">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#00d4ff" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="1"/><path d="M18 7h1M18 11h1M18 15h1" stroke-width="3"/></svg>
                </div>
                <strong>Opti-build PC</strong>
            </div>
            <div class="wa-content">Salut ! Dis-moi ton budget, je te fais un devis.</div>
            <a href="https://wa.me/33769188046" class="wa-link" target="_blank">WhatsApp</a>
        </div>
        <div class="wa-button" onclick="toggleChat()">
            <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="#00d4ff" stroke-width="1.5"><rect x="5" y="3" width="14" height="18" rx="1" /><path d="M8 6h8v10H8z" opacity="0.3" fill="#00d4ff"/><path d="M7 21l-1 1M17 21l1 1" /></svg>
        </div>
    </div>

    <script>
        function toggleChat() {
            var box = document.getElementById('wa-box');
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        }
    </script>
</body>
</html>
