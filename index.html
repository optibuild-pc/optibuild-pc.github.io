<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti-build PC | Montage Expert à Valenciennes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Animation pour la bulle WhatsApp */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); transform: scale(1); }
        }
        .whatsapp-main-btn { animation: pulse-green 2s infinite; }

        .hero-banner {
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                              url('https://images.unsplash.com/photo-1587202372775-e229f172b9d7?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Transition pour la fenêtre de tchat */
        #tchat-window {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #tchat-window.hidden-tchat {
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="whatsapp-wrapper" class="fixed bottom-6 right-6 z-[999] flex flex-col items-end">
        
        <div id="tchat-window" class="hidden-tchat bg-white rounded-[2rem] shadow-2xl w-72 mb-4 overflow-hidden border border-slate-100">
            <div class="bg-blue-600 p-5 text-white flex items-center gap-3">
