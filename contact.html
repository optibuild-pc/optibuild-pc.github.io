<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Opti-build PC Valenciennes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 font-bold uppercase tracking-widest text-[10px]">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter normal-case">Opti-build PC</a>
            <div class="flex space-x-4 md:space-x-8 text-slate-500">
                <a href="index.html" class="hover:text-blue-600 transition">Accueil</a>
                <a href="boutique.html" class="hover:text-blue-600 transition">Boutique</a>
                <a href="contact.html" class="text-blue-600">Contact</a>
            </div>
        </div>
    </nav>

    <section class="py-20 px-4 max-w-4xl mx-auto text-center">
        <h2 class="text-4xl font-black uppercase italic mb-12 tracking-tighter">Me Contacter</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <i class="fab fa-whatsapp text-5xl text-[#25D366] mb-6"></i>
                <h3 class="font-black uppercase italic mb-4">WhatsApp Direct</h3>
                <a href="https://wa.me/33648541246" class="bg-[#25D366] text-white px-8 py-4 rounded-full font-black uppercase italic tracking-widest text-[10px] inline-block">Envoyer un message</a>
            </div>

            <div class="bg-slate-900 p-10 rounded-[2.5rem] shadow-xl text-white">
                <i class="fas fa-map-marker-alt text-5xl text-blue-500 mb-6"></i>
                <h3 class="font-black uppercase italic mb-4">Secteur</h3>
                <p class="text-blue-400 font-black text-xl mb-2">Valenciennes (59)</p>
                <p class="text-slate-400 text-xs italic">Remise en main propre / Livraison locale possible.</p>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm max-w-md mx-auto">
            <h3 class="font-black uppercase italic mb-8 text-slate-400 text-xs tracking-[0.3em]">Disponibilités</h3>
            <div class="space-y-4 text-sm font-bold italic">
                <div class="flex justify-between border-b pb-2"><span>Semaine</span> <span class="text-blue-600">18h - 21h</span></div>
                <div class="flex justify-between border-b pb-2"><span>Week-end</span> <span class="text-blue-600">10h - 20h</span></div>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 text-white py-12 text-center">
        <p class="text-[9px] text-slate-500 uppercase tracking-[0.4em]">© 2026 • Opti-build PC • Valenciennes</p>
    </footer>

</body>
</html>
